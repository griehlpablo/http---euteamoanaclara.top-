name: Atualizar calendário de vôlei

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-volleyball-calendar
  cancel-in-progress: true

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Atualizar arquivo ICS
        run: node scripts/update-volleyball-calendar.mjs

      - name: Publicar alterações
        shell: bash
        run: |
          if git diff --quiet -- calendarios/brasil-volei-feminino.ics novo-site/public/calendarios/brasil-volei-feminino.ics; then
            echo "Nenhuma mudança na agenda."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add calendarios/brasil-volei-feminino.ics novo-site/public/calendarios/brasil-volei-feminino.ics
          git commit -m "calendar: atualizar jogos do vôlei feminino"
          git push
