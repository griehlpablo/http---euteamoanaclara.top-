name: Carregar gastos da planilha

on:
  push:
    paths:
      - .github/workflows/load-gastos-sheet.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Atualizar integração da planilha
        run: |
          python - <<'PY'
          from pathlib import Path

          gastos_path = Path('novo-site/src/pages/Gastos.jsx')
          gastos = gastos_path.read_text(encoding='utf-8')

          helper_start = gastos.find('const deleteSyncedExpense = async')
          helper_end = gastos.find('\n\nconst syncExpense = async', helper_start)
          if helper_start < 0 or helper_end < 0:
              raise RuntimeError('Função de exclusão sincronizada não encontrada')
          helpers = '''const deleteSyncedExpense = async (entry) => {
            const response = await fetch("/api/gastos", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                action: "deleteExpense",
                expenseId: entry.id,
                row: entry.sheetRow || null,
              }),
            });

            const result = await response.json().catch(() => ({}));
            if (!response.ok || !result.ok) {
              throw new Error(result.error || `Erro HTTP ${response.status}`);
            }
            return result;
          };

          const loadSyncedExpenses = async () => {
            const response = await fetch("/api/gastos", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ action: "listExpenses" }),
            });

            const result = await response.json().catch(() => ({}));
            if (!response.ok || !result.ok) {
              throw new Error(result.error || `Erro HTTP ${response.status}`);
            }

            return Array.isArray(result.entries)
              ? result.entries.map((entry) => ({ ...entry, synced: true }))
              : [];
          };'''
          gastos = gastos[:helper_start] + helpers + gastos[helper_end:]

          state_marker = '  const [deletingId, setDeletingId] = useState("");'
          if 'const [isLoadingEntries, setIsLoadingEntries]' not in gastos:
              if state_marker not in gastos:
                  raise RuntimeError('Estado de exclusão não encontrado')
              gastos = gastos.replace(
                  state_marker,
                  state_marker + '\n  const [isLoadingEntries, setIsLoadingEntries] = useState(true);',
                  1,
              )

          effect_marker = '''  useEffect(() => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
          }, [entries]);'''
          refresh = '''  const refreshSheetEntries = async ({ silent = false } = {}) => {
            if (!silent) setIsLoadingEntries(true);

            try {
              const sheetEntries = await loadSyncedExpenses();
              setEntries((previous) => {
                const localOnly = previous.filter(
                  (entry) => !entry.synced && !isMarkedAsSynced(entry.id),
                );
                const merged = new Map();

                for (const entry of [...sheetEntries, ...localOnly]) {
                  if (!merged.has(entry.id)) merged.set(entry.id, entry);
                }

                return [...merged.values()].sort((a, b) => {
                  const first = new Date(a.createdAt || `${a.date}T12:00:00`).getTime();
                  const second = new Date(b.createdAt || `${b.date}T12:00:00`).getTime();
                  return second - first;
                });
              });
            } catch (error) {
              if (!silent) {
                setMessage(
                  `Não consegui carregar a planilha: ${error?.message || String(error)}`,
                );
              }
            } finally {
              if (!silent) setIsLoadingEntries(false);
            }
          };

          useEffect(() => {
            refreshSheetEntries();
          }, []);

          '''
          if 'const refreshSheetEntries' not in gastos:
              if effect_marker not in gastos:
                  raise RuntimeError('Efeito de armazenamento não encontrado')
              gastos = gastos.replace(effect_marker, refresh + effect_marker, 1)

          sync_line = '      await syncExpense(entry);'
          sync_replacement = '''      const syncResult = await syncExpense(entry);
              setEntries((previous) =>
                previous.map((item) =>
                  item.id === entry.id
                    ? { ...item, synced: true, sheetRow: syncResult.row || null }
                    : item,
                ),
              );'''
          if sync_line not in gastos:
              raise RuntimeError('Sincronização após cadastro não encontrada')
          gastos = gastos.replace(sync_line, sync_replacement, 1)

          if 'const synced = isMarkedAsSynced(entry.id);' not in gastos:
              raise RuntimeError('Verificação de sincronização não encontrada')
          gastos = gastos.replace(
              'const synced = isMarkedAsSynced(entry.id);',
              'const synced = Boolean(entry.synced || isMarkedAsSynced(entry.id));',
              1,
          )
          if 'await deleteSyncedExpense(entry.id);' not in gastos:
              raise RuntimeError('Chamada de exclusão antiga não encontrada')
          gastos = gastos.replace(
              'await deleteSyncedExpense(entry.id);',
              'await deleteSyncedExpense(entry);',
              1,
          )

          empty_condition = '{entries.length === 0 ? ('
          loading_condition = '''{isLoadingEntries ? (
                          <div className="rounded-2xl border border-dashed border-slate-200 dark:border-slate-700 p-8 text-center text-sm text-slate-400">
                            <Loader2 className="mx-auto mb-2 animate-spin" size={20} />
                            Carregando lançamentos da planilha...
                          </div>
                        ) : entries.length === 0 ? ('''
          if empty_condition not in gastos:
              raise RuntimeError('Condição da lista vazia não encontrada')
          gastos = gastos.replace(empty_condition, loading_condition, 1)
          gastos = gastos.replace(
              'Nenhuma compra registrada neste aparelho.',
              'Nenhuma compra encontrada na planilha.',
              1,
          )
          gastos_path.write_text(gastos, encoding='utf-8')

          api_path = Path('api/gastos.js')
          api = api_path.read_text(encoding='utf-8')
          delete_line = '''    const validDelete =
              action === "deleteExpense" &&
              Boolean(String(body?.expenseId || "").trim());'''
          if delete_line not in api:
              raise RuntimeError('Validação de exclusão da API não encontrada')
          api = api.replace(
              delete_line,
              delete_line + '\n    const validList = action === "listExpenses";',
              1,
          )
          api = api.replace(
              'if (!validAppend && !validDelete) {',
              'if (!validAppend && !validDelete && !validList) {',
              1,
          )
          old_payload = '''      ...(validAppend
                ? { expense: body.expense }
                : { expenseId: String(body.expenseId).trim() }),'''
          new_payload = '''      ...(validAppend
                ? { expense: body.expense }
                : validDelete
                  ? {
                      expenseId: String(body.expenseId).trim(),
                      row: Number(body.row) || null,
                    }
                  : {}),'''
          if old_payload not in api:
              raise RuntimeError('Payload da API não encontrado')
          api = api.replace(old_payload, new_payload, 1)
          api = api.replace(
              '        missing: Boolean(result.missing),',
              '        missing: Boolean(result.missing),\n        entries: Array.isArray(result.entries) ? result.entries : [],',
              1,
          )
          api_path.write_text(api, encoding='utf-8')

          code_path = Path('integrations/google-sheets/Code.gs')
          code = code_path.read_text(encoding='utf-8')
          old_actions = '''  if (payload.action === 'appendExpense') {
              result = appendExpense_(payload.expense || {});
            } else if (payload.action === 'deleteExpense') {
              result = deleteExpense_(payload.expenseId);
            } else {
              throw new Error('Ação não reconhecida.');
            }'''
          new_actions = '''  if (payload.action === 'appendExpense') {
              result = appendExpense_(payload.expense || {});
            } else if (payload.action === 'deleteExpense') {
              result = deleteExpense_(payload.expenseId, payload.row);
            } else if (payload.action === 'listExpenses') {
              result = listExpenses_();
            } else {
              throw new Error('Ação não reconhecida.');
            }'''
          if old_actions not in code:
              raise RuntimeError('Ações atuais do Apps Script não encontradas')
          code = code.replace(old_actions, new_actions, 1)

          start = code.find('function deleteExpense_(expenseId) {')
          end = code.find('\n\nfunction findNextEmptyRow_', start)
          if start < 0 or end < 0:
              raise RuntimeError('Função de exclusão atual não encontrada')
          functions = r'''function listExpenses_() {
            const spreadsheet = SpreadsheetApp.openById(CONFIG.SPREADSHEET_ID);
            const sheet = spreadsheet.getSheetByName(CONFIG.SHEET_NAME);
            if (!sheet) throw new Error('A aba "Lançamentos" não foi encontrada.');

            const lastRow = sheet.getLastRow();
            if (lastRow < CONFIG.FIRST_DATA_ROW) return { entries: [] };

            const properties = PropertiesService.getScriptProperties().getProperties();
            const idsByRow = {};
            Object.keys(properties).forEach(function (key) {
              if (key.indexOf(CONFIG.DEDUPE_PREFIX) !== 0) return;
              const row = Number(properties[key]);
              if (Number.isInteger(row)) idsByRow[row] = key.slice(CONFIG.DEDUPE_PREFIX.length);
            });

            const values = sheet
              .getRange(CONFIG.FIRST_DATA_ROW, 1, lastRow - CONFIG.FIRST_DATA_ROW + 1, 11)
              .getValues();
            const entries = [];

            values.forEach(function (columns, index) {
              const row = CONFIG.FIRST_DATA_ROW + index;
              const hasContent = columns.some(function (value) {
                return String(value === null || value === undefined ? '' : value).trim() !== '';
              });
              if (!hasContent) return;

              const date = formatDateKey_(columns[0]);
              entries.push({
                id: idsByRow[row] || 'sheet-row-' + row,
                sheetRow: row,
                synced: true,
                date: date,
                description: String(columns[1] || '').trim() || 'Lançamento da planilha',
                category: String(columns[2] || '').trim() || 'Outros/imprevistos',
                person: String(columns[4] || '').trim() || 'Pablo',
                account: String(columns[5] || '').trim() || 'Outra conta',
                paymentMethod: String(columns[7] || '').trim() || 'Outro',
                amount: Number(columns[8]) || 0,
                notes: String(columns[10] || '').trim(),
                createdAt: date ? date + 'T12:00:00-03:00' : new Date().toISOString(),
              });
            });

            entries.sort(function (a, b) { return b.sheetRow - a.sheetRow; });
            return { entries: entries };
          }

          function deleteExpense_(expenseId, requestedRow) {
            const id = String(expenseId || '').trim();
            if (!id) throw new Error('Identificador do lançamento ausente.');

            const lock = LockService.getScriptLock();
            lock.waitLock(10000);

            try {
              const properties = PropertiesService.getScriptProperties();
              const dedupeKey = CONFIG.DEDUPE_PREFIX + id;
              const storedRow = properties.getProperty(dedupeKey);
              const row = Number(storedRow || requestedRow);
              if (!Number.isInteger(row) || row < CONFIG.FIRST_DATA_ROW) {
                return { deleted: false, missing: true };
              }

              const spreadsheet = SpreadsheetApp.openById(CONFIG.SPREADSHEET_ID);
              const sheet = spreadsheet.getSheetByName(CONFIG.SHEET_NAME);
              if (!sheet) throw new Error('A aba "Lançamentos" não foi encontrada.');

              sheet.getRange(row, 1, 1, 11).clearContent();
              if (storedRow) properties.deleteProperty(dedupeKey);
              SpreadsheetApp.flush();
              return { deleted: true, missing: false, row: row };
            } finally {
              lock.releaseLock();
            }
          }

          function formatDateKey_(value) {
            if (Object.prototype.toString.call(value) === '[object Date]' && !isNaN(value.getTime())) {
              return Utilities.formatDate(value, Session.getScriptTimeZone() || 'America/Sao_Paulo', 'yyyy-MM-dd');
            }
            const text = String(value || '').trim();
            const iso = /^(\d{4})-(\d{2})-(\d{2})/.exec(text);
            if (iso) return iso[1] + '-' + iso[2] + '-' + iso[3];
            const brazilian = /^(\d{2})\/(\d{2})\/(\d{4})/.exec(text);
            if (brazilian) return brazilian[3] + '-' + brazilian[2] + '-' + brazilian[1];
            return '';
          }'''
          code = code[:start] + functions + code[end:]
          code_path.write_text(code, encoding='utf-8')
          PY

      - name: Formatar e testar
        working-directory: novo-site
        run: |
          npx --yes prettier@3.6.2 --write src/pages/Gastos.jsx ../api/gastos.js
          npm ci
          npm run build:root

      - name: Salvar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add novo-site/src/pages/Gastos.jsx api/gastos.js integrations/google-sheets/Code.gs assets index.html
          git commit -m "feat: carregar lançamentos da planilha no site"
          git push