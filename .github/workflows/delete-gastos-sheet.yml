name: Excluir gastos da planilha

on:
  push:
    paths:
      - .github/workflows/delete-gastos-sheet.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Atualizar exclusão de lançamentos
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          gastos_path = Path('novo-site/src/pages/Gastos.jsx')
          gastos = gastos_path.read_text(encoding='utf-8')

          helper_marker = 'const syncExpense = async (entry) => {'
          helpers = '''const isMarkedAsSynced = (id) => {
            const synced = readJson(SHEET_SYNCED_KEY, []);
            return Array.isArray(synced) && synced.includes(id);
          };

          const unmarkAsSynced = (id) => {
            const synced = readJson(SHEET_SYNCED_KEY, []);
            const next = Array.isArray(synced) ? synced.filter((item) => item !== id) : [];
            localStorage.setItem(SHEET_SYNCED_KEY, JSON.stringify(next));
          };

          const deleteSyncedExpense = async (id) => {
            const response = await fetch('/api/gastos', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'deleteExpense', expenseId: id }),
            });

            const result = await response.json().catch(() => ({}));
            if (!response.ok || !result.ok) {
              throw new Error(result.error || `Erro HTTP ${response.status}`);
            }
            return result;
          };

          '''
          if 'const deleteSyncedExpense' not in gastos:
              if helper_marker not in gastos:
                  raise RuntimeError('Marcador de sincronização não encontrado')
              gastos = gastos.replace(helper_marker, helpers + helper_marker, 1)

          state_marker = '  const [isSaving, setIsSaving] = useState(false);'
          if 'const [deletingId, setDeletingId]' not in gastos:
              if state_marker not in gastos:
                  raise RuntimeError('Estado de salvamento não encontrado')
              gastos = gastos.replace(
                  state_marker,
                  state_marker + "\n  const [deletingId, setDeletingId] = useState('');",
                  1,
              )

          delete_start = gastos.find('  const deleteEntry = (id) => {')
          delete_end = gastos.find('\n\n  const exportCsv', delete_start)
          if delete_start < 0 or delete_end < 0:
              raise RuntimeError('Função antiga de exclusão não encontrada')
          new_delete = '''  const deleteEntry = async (entry) => {
            const synced = isMarkedAsSynced(entry.id);
            const confirmation = synced
              ? 'Apagar este lançamento do site e também da planilha?'
              : 'Apagar este lançamento deste aparelho?';
            if (!window.confirm(confirmation)) return;

            setDeletingId(entry.id);
            setMessage('');

            try {
              if (synced) await deleteSyncedExpense(entry.id);
              setEntries((previous) => previous.filter((item) => item.id !== entry.id));
              unmarkAsSynced(entry.id);
              setMessage(
                synced
                  ? `Lançamento apagado do site e da planilha: ${entry.description}.`
                  : `Lançamento apagado antes de ser enviado à planilha: ${entry.description}.`,
              );
            } catch (error) {
              setMessage(
                `Não consegui apagar da planilha. O lançamento foi mantido no site: ${error?.message || String(error)}`,
              );
            } finally {
              setDeletingId('');
            }
          };'''
          gastos = gastos[:delete_start] + new_delete + gastos[delete_end:]

          button_pattern = re.compile(
              r'''<button\s+onClick=\{\(\) => deleteEntry\(entry\.id\)\}\s+className="rounded-full p-2 text-slate-300 hover:bg-red-50 hover:text-red-500 transition-colors"\s+title="Apagar lançamento"\s*>\s*<Trash2 size=\{17\} />\s*</button>''',
              re.S,
          )
          new_button = '''<button
                        type="button"
                        onClick={() => deleteEntry(entry)}
                        disabled={deletingId === entry.id}
                        className="rounded-full p-2 text-slate-300 hover:bg-red-50 hover:text-red-500 transition-colors disabled:cursor-wait disabled:opacity-50"
                        title="Apagar do site e da planilha"
                      >
                        {deletingId === entry.id ? (
                          <Loader2 size={17} className="animate-spin" />
                        ) : (
                          <Trash2 size={17} />
                        )}
                      </button>'''
          gastos, count = button_pattern.subn(new_button, gastos, count=1)
          if count != 1:
              raise RuntimeError('Botão antigo de exclusão não encontrado')
          gastos_path.write_text(gastos, encoding='utf-8')

          api_path = Path('api/gastos.js')
          api = api_path.read_text(encoding='utf-8')
          validation_start = api.find("    if (body?.action !== 'appendExpense'")
          validation_end = api.find('\n\n    try {', validation_start)
          if validation_start < 0 or validation_end < 0:
              raise RuntimeError('Validação antiga da API não encontrada')
          new_validation = '''    const action = body?.action;
            const validAppend = action === 'appendExpense' && isValidExpense(body?.expense);
            const validDelete =
              action === 'deleteExpense' && Boolean(String(body?.expenseId || '').trim());

            if (!validAppend && !validDelete) {
              return json({ ok: false, error: 'Lançamento ou ação inválida.' }, 400);
            }

            const upstreamPayload = {
              action,
              token,
              ...(validAppend
                ? { expense: body.expense }
                : { expenseId: String(body.expenseId).trim() }),
            };'''
          api = api[:validation_start] + new_validation + api[validation_end:]
          api = api.replace(
              '      return json({ ok: true, row: result.row, duplicate: Boolean(result.duplicate) });',
              '''      return json({
                ok: true,
                row: result.row,
                duplicate: Boolean(result.duplicate),
                deleted: Boolean(result.deleted),
                missing: Boolean(result.missing),
              });''',
              1,
          )
          api_path.write_text(api, encoding='utf-8')

          code_path = Path('integrations/google-sheets/Code.gs')
          code = code_path.read_text(encoding='utf-8')
          action_start = code.find("    if (payload.action !== 'appendExpense')")
          action_end = code.find('\n    return jsonResponse_', action_start)
          if action_start < 0 or action_end < 0:
              raise RuntimeError('Ação antiga do Apps Script não encontrada')
          new_action = '''    let result;
            if (payload.action === 'appendExpense') {
              result = appendExpense_(payload.expense || {});
            } else if (payload.action === 'deleteExpense') {
              result = deleteExpense_(payload.expenseId);
            } else {
              throw new Error('Ação não reconhecida.');
            }'''
          code = code[:action_start] + new_action + code[action_end:]

          marker = 'function findNextEmptyRow_(sheet) {'
          delete_function = '''function deleteExpense_(expenseId) {
            const id = String(expenseId || '').trim();
            if (!id) throw new Error('Identificador do lançamento ausente.');

            const lock = LockService.getScriptLock();
            lock.waitLock(10000);

            try {
              const properties = PropertiesService.getScriptProperties();
              const dedupeKey = CONFIG.DEDUPE_PREFIX + id;
              const storedRow = properties.getProperty(dedupeKey);
              if (!storedRow) return { deleted: false, missing: true };

              const row = Number(storedRow);
              if (!Number.isInteger(row) || row < CONFIG.FIRST_DATA_ROW) {
                throw new Error('Linha armazenada para o lançamento é inválida.');
              }

              const spreadsheet = SpreadsheetApp.openById(CONFIG.SPREADSHEET_ID);
              const sheet = spreadsheet.getSheetByName(CONFIG.SHEET_NAME);
              if (!sheet) throw new Error('A aba "Lançamentos" não foi encontrada.');

              sheet.getRange(row, 1, 1, 11).clearContent();
              properties.deleteProperty(dedupeKey);
              SpreadsheetApp.flush();
              return { deleted: true, missing: false, row };
            } finally {
              lock.releaseLock();
            }
          }

          function findNextEmptyRow_(sheet) {'''
          if 'function deleteExpense_' not in code:
              if marker not in code:
                  raise RuntimeError('Marcador de linha do Apps Script não encontrado')
              code = code.replace(marker, delete_function, 1)
          code_path.write_text(code, encoding='utf-8')
          PY

      - name: Formatar e testar
        working-directory: novo-site
        run: |
          npx --yes prettier@3.6.2 --write src/pages/Gastos.jsx ../api/gastos.js
          npm ci
          npm run build:root

      - name: Salvar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add novo-site/src/pages/Gastos.jsx api/gastos.js integrations/google-sheets/Code.gs assets index.html
          git commit -m "feat: excluir lançamentos da planilha pelo site"
          git push