name: Formatação final

on:
  push:
    paths:
      - .github/workflows/format-code.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Formatar arquivos alterados
        run: |
          npx --yes prettier@3.6.2 --write \
            api/notify.js \
            novo-site/src/pages/AssistenteCasal.jsx \
            novo-site/src/pages/Links.jsx \
            novo-site/src/services/gemini.js \
            novo-site/src/services/notifications.js \
            novo-site/src/supabase.js \
            novo-site/vite.config.js

      - name: Instalar dependências
        working-directory: novo-site
        run: npm ci

      - name: Compilar e publicar na raiz
        working-directory: novo-site
        run: npm run build:root

      - name: Salvar formatação
        run: |
          rm -f .github/workflows/format-code.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: formatar arquivos atualizados"
          git push
