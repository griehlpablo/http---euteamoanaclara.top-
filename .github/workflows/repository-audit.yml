name: Verificar arquivos do repositório

on:
  push:
    paths:
      - .github/workflows/repository-audit.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar relatório
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import subprocess
          import urllib.request
          from pathlib import Path

          files = subprocess.check_output(['git', 'ls-files', '-z']).decode().split('\0')
          files = sorted(path for path in files if path and path != '_repository_audit.txt')

          literal_patterns = re.compile(
              r'chatgpt|openai|github\s+copilot|\bcopilot\b|anthropic|\bclaude\b|'
              r'ai[- ]generated|generated\s+by|gerad[oa]\s+por|criad[oa]\s+por\s+(?:uma\s+)?ia|'
              r'feito\s+por\s+(?:uma\s+)?ia|assistido\s+por\s+(?:uma\s+)?ia',
              re.IGNORECASE,
          )
          comment_prefix = re.compile(r'^\s*(?://|/\*|\*|#|<!--|--)(?!\!)')
          meta_comment = re.compile(
              r'\b(?:novo|nova|adicionado|adicionada|corrigido|corrigida|alterado|alterada|'
              r'agora|tempor[aá]rio|fallback|compatibilidade|melhoria|ajuste|observa[cç][aã]o|'
              r'importante|todo|fixme|hack|m[aá]gica|componente)\b',
              re.IGNORECASE,
          )
          source_extensions = {
              '.js', '.jsx', '.ts', '.tsx', '.mjs', '.cjs', '.css', '.scss', '.html',
              '.sql', '.sh', '.yml', '.yaml', '.toml', '.gs', '.py', '.md',
          }

          report = []
          report.append('REPOSITORY FILE AUDIT')
          report.append(f'TOTAL_TRACKED_FILES={len(files)}')

          try:
              request = urllib.request.Request(
                  f'https://api.github.com/repos/{os.environ["GH_REPOSITORY"]}',
                  headers={
                      'Authorization': f'Bearer {os.environ["GH_TOKEN"]}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
              )
              with urllib.request.urlopen(request) as response:
                  metadata = json.load(response)
              report.append(f'REPOSITORY_DESCRIPTION={metadata.get("description") or ""}')
              report.append(f'REPOSITORY_HOMEPAGE={metadata.get("homepage") or ""}')
          except Exception as error:
              report.append(f'REPOSITORY_METADATA_ERROR={error}')

          report.append('')
          report.append('[FILES]')
          report.extend(files)
          report.append('')
          report.append('[MATCHES]')

          matches = 0
          comments = []
          for path in files:
              file_path = Path(path)
              try:
                  raw = file_path.read_bytes()
              except OSError:
                  continue
              if b'\0' in raw[:8192]:
                  continue
              try:
                  text = raw.decode('utf-8')
              except UnicodeDecodeError:
                  continue
              for number, line in enumerate(text.splitlines(), 1):
                  reasons = []
                  if literal_patterns.search(line):
                      reasons.append('literal')
                  is_comment = bool(comment_prefix.search(line))
                  if is_comment and meta_comment.search(line):
                      reasons.append('meta-comment')
                  if reasons:
                      matches += 1
                      compact = line.strip().replace('\t', ' ')
                      report.append(f'{path}:{number}:{"+".join(reasons)}:{compact[:500]}')
                  if (
                      is_comment
                      and file_path.suffix.lower() in source_extensions
                      and not path.startswith('assets/')
                      and not path.startswith('novo-site/public/')
                      and path != '.github/workflows/repository-audit.yml'
                  ):
                      comments.append(f'{path}:{number}:{line.strip()[:500]}')

          report.append('')
          report.append(f'TOTAL_MATCHES={matches}')
          report.append('')
          report.append('[COMMENTS]')
          report.extend(comments)
          report.append('')
          report.append(f'TOTAL_COMMENTS={len(comments)}')
          report.append('')
          report.append('[SUPABASE_HISTORY_RECOVERY]')

          object_lines = subprocess.check_output(['git', 'rev-list', '--objects', '--all']).decode().splitlines()
          object_paths = {}
          for line in object_lines:
              parts = line.split(' ', 1)
              object_paths.setdefault(parts[0], parts[1] if len(parts) > 1 else '')

          process = subprocess.Popen(
              ['git', 'cat-file', '--batch'],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
          )
          assert process.stdin and process.stdout

          anon_keys = {}
          publishable_keys = {}
          jwt_pattern = re.compile(rb'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+')
          publishable_pattern = re.compile(rb'sb_publishable_[A-Za-z0-9_-]+')

          for sha, path in object_paths.items():
              process.stdin.write((sha + '\n').encode())
              process.stdin.flush()
              header = process.stdout.readline().decode().strip().split()
              if len(header) < 3 or header[1] != 'blob':
                  continue
              size = int(header[2])
              data = process.stdout.read(size)
              process.stdout.read(1)
              if size > 25_000_000:
                  continue
              for token_bytes in jwt_pattern.findall(data):
                  token = token_bytes.decode()
                  try:
                      payload_part = token.split('.')[1]
                      payload_part += '=' * (-len(payload_part) % 4)
                      payload = json.loads(base64.urlsafe_b64decode(payload_part))
                  except Exception:
                      continue
                  if payload.get('role') == 'anon':
                      anon_keys.setdefault(token, path)
              for token_bytes in publishable_pattern.findall(data):
                  publishable_keys.setdefault(token_bytes.decode(), path)

          process.stdin.close()
          process.wait()

          for key, path in anon_keys.items():
              report.append(f'ANON_KEY={key}')
              report.append(f'ANON_KEY_PATH={path}')
          for key, path in publishable_keys.items():
              report.append(f'PUBLISHABLE_KEY={key}')
              report.append(f'PUBLISHABLE_KEY_PATH={path}')
          report.append(f'ANON_KEY_COUNT={len(anon_keys)}')
          report.append(f'PUBLISHABLE_KEY_COUNT={len(publishable_keys)}')

          Path('_repository_audit.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Salvar relatório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _repository_audit.txt
          git commit -m "chore: atualizar auditoria temporária [skip ci]"
          git push
