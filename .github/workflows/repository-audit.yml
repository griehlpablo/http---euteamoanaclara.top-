name: Verificar arquivos do repositório

on:
  push:
    paths:
      - .github/workflows/repository-audit.yml

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar relatório
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import subprocess
          import urllib.request
          from pathlib import Path

          files = subprocess.check_output(['git', 'ls-files', '-z']).decode().split('\0')
          files = sorted(path for path in files if path and path != '_repository_audit.txt')

          literal_patterns = re.compile(
              r'chatgpt|openai|github\s+copilot|\bcopilot\b|anthropic|\bclaude\b|'
              r'ai[- ]generated|generated\s+by|gerad[oa]\s+por|criad[oa]\s+por\s+(?:uma\s+)?ia|'
              r'feito\s+por\s+(?:uma\s+)?ia|assistido\s+por\s+(?:uma\s+)?ia',
              re.IGNORECASE,
          )
          comment_prefix = re.compile(r'^\s*(?://|/\*|\*|#|<!--|--)(?!\!)')
          meta_comment = re.compile(
              r'\b(?:novo|nova|adicionado|adicionada|corrigido|corrigida|alterado|alterada|'
              r'agora|tempor[aá]rio|fallback|compatibilidade|melhoria|ajuste|observa[cç][aã]o|'
              r'importante|todo|fixme|hack)\b',
              re.IGNORECASE,
          )

          report = []
          report.append('REPOSITORY FILE AUDIT')
          report.append(f'TOTAL_TRACKED_FILES={len(files)}')

          try:
              request = urllib.request.Request(
                  f'https://api.github.com/repos/{os.environ["GH_REPOSITORY"]}',
                  headers={
                      'Authorization': f'Bearer {os.environ["GH_TOKEN"]}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
              )
              with urllib.request.urlopen(request) as response:
                  metadata = json.load(response)
              report.append(f'REPOSITORY_DESCRIPTION={metadata.get("description") or ""}')
              report.append(f'REPOSITORY_HOMEPAGE={metadata.get("homepage") or ""}')
          except Exception as error:
              report.append(f'REPOSITORY_METADATA_ERROR={error}')

          report.append('')
          report.append('[FILES]')
          report.extend(files)
          report.append('')
          report.append('[MATCHES]')

          matches = 0
          for path in files:
              file_path = Path(path)
              try:
                  raw = file_path.read_bytes()
              except OSError:
                  continue
              if b'\0' in raw[:8192]:
                  continue
              try:
                  text = raw.decode('utf-8')
              except UnicodeDecodeError:
                  continue
              for number, line in enumerate(text.splitlines(), 1):
                  reasons = []
                  if literal_patterns.search(line):
                      reasons.append('literal')
                  if comment_prefix.search(line) and meta_comment.search(line):
                      reasons.append('meta-comment')
                  if reasons:
                      matches += 1
                      compact = line.strip().replace('\t', ' ')
                      report.append(f'{path}:{number}:{"+".join(reasons)}:{compact[:500]}')

          report.append('')
          report.append(f'TOTAL_MATCHES={matches}')
          report.append('')
          report.append('[SUPABASE_RECOVERY]')

          old_asset = subprocess.check_output([
              'git', 'show',
              '4aaab7cc7ed6ee001c2390e259fc2486e48ed429:assets/main-C3WGilLr.js',
          ]).decode('utf-8', errors='ignore')
          tokens = re.findall(r'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+', old_asset)
          anon_key = ''
          for token in tokens:
              try:
                  payload_part = token.split('.')[1]
                  payload_part += '=' * (-len(payload_part) % 4)
                  payload = json.loads(base64.urlsafe_b64decode(payload_part))
              except Exception:
                  continue
              if payload.get('role') == 'anon':
                  anon_key = token
                  break
          report.append(f'ANON_KEY={anon_key}')
          report.append(f'ANON_KEY_FOUND={"yes" if anon_key else "no"}')

          Path('_repository_audit.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          PY

      - name: Salvar relatório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _repository_audit.txt
          git commit -m "chore: registrar auditoria temporária [skip ci]"
          git push
