name: Diagnóstico da manutenção

on:
  push:
    paths:
      - .github/workflows/code-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar pontos de alteração
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          assistant = Path('novo-site/src/pages/AssistenteCasal.jsx').read_text(encoding='utf-8')
          links = Path('novo-site/src/pages/Links.jsx').read_text(encoding='utf-8')
          gemini = Path('novo-site/src/services/gemini.js').read_text(encoding='utf-8')

          checks = {
              'gemini_format_anchor': 'const formatHistory = ' in gemini,
              'gemini_instruction': 'const systemInstruction = options.systemInstruction || DEFAULT_SYSTEM_INSTRUCTION;' in gemini,
              'assistant_file_reader': "  reader.onerror = (error) => reject(error);\n});" in assistant,
              'assistant_load': "    (async () => {\n      const { data, error } = await supabase.from('chats').select('*').order('createdAt', { ascending: false });" in assistant,
              'assistant_notification_count': len(re.findall(r"      if \(botResponse\.includes\('\[AVISAR_PABLO\]'\)\) \{[\s\S]*?\n      \}", assistant)),
              'assistant_status_count': len(re.findall(r"\s*\{!isSupabaseConfigured && <span[^\n]+\n\s*\{currentModelName && <span[^\n]+\n", assistant)),
              'links_function_count': len(re.findall(r"const callGeminiForSummarization = async[\s\S]*?\n};\n\nexport default function Links\(\)", links)),
          }

          Path('_code_diagnostic.txt').write_text(
              '\n'.join(f'{key}={value}' for key, value in checks.items()) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Salvar diagnóstico
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _code_diagnostic.txt
          git commit -m "chore: registrar diagnóstico temporário [skip ci]"
          git push
