name: Publicar build na raiz

on:
  push:
    branches:
      - main
    paths:
      - 'novo-site/**'
      - '.github/workflows/publish-build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-root-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: novo-site/package-lock.json

      - name: Instalar dependências
        working-directory: novo-site
        run: npm ci

      - name: Verificar configuração do Supabase
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$VITE_SUPABASE_URL" ] && [ -n "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Supabase configurado para este build."
          else
            echo "Aviso: secrets do Supabase ausentes. O site será publicado sem sincronização, mas não ficará em branco."
          fi

      - name: Compilar e copiar para a raiz
        working-directory: novo-site
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:root

      - name: Salvar build publicado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração de build para publicar."
            exit 0
          fi
          git commit -m "build: atualizar arquivos publicados [skip ci]"
          git push
