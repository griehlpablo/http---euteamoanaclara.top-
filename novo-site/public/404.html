<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando...</title>
    <script>
      const target = window.location.pathname + window.location.search + window.location.hash;
      if (window.location.pathname.startsWith('/planohelena')) {
        window.location.replace('/planohelena/' + window.location.search + window.location.hash);
      } else {
        sessionStorage.setItem('spaRedirect', target);
        window.location.replace('/');
      }
    </script>
  </head>
  <body>
    Redirecionando...
  </body>
</html>
