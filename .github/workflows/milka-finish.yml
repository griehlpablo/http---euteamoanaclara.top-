name: Ajustes da Milka

on:
  push:
    paths:
      - .github/workflows/milka-finish.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Atualizar páginas
        run: |
          python - <<'PY'
          from pathlib import Path

          mural_path = Path('novo-site/src/pages/Mural.jsx')
          mural = mural_path.read_text(encoding='utf-8')
          old = ".select('*')\n        .order('timestamp', { ascending: false });"
          new = ".select('*')\n        .not('author', 'like', 'milka:%')\n        .order('timestamp', { ascending: false });"
          if old not in mural:
              raise RuntimeError('Consulta do mural não encontrada')
          mural_path.write_text(mural.replace(old, new, 1), encoding='utf-8')

          milka_path = Path('novo-site/src/pages/MilkaMaria.jsx')
          milka = milka_path.read_text(encoding='utf-8')
          old_block = """    setActivities(activityRows);
    if (Array.isArray(scheduleRow?.schedules) && scheduleRow.schedules.length) {
      setSchedules(scheduleRow.schedules);
    }
    setLoading(false);"""
          new_block = """    setActivities(activityRows);
    if (Array.isArray(scheduleRow?.schedules) && scheduleRow.schedules.length) {
      setSchedules(scheduleRow.schedules);
    } else {
      const timestamp = new Date().toISOString();
      await supabase.from('mural').insert([
        {
          text: JSON.stringify({
            kind: 'milka-schedule-set',
            schedules: DEFAULT_SCHEDULES,
            updatedAt: timestamp,
          }),
          author: 'milka:schedule',
          imageUrl: null,
          timestamp,
          likes: [],
        },
      ]);
      setSchedules(DEFAULT_SCHEDULES);
    }
    setLoading(false);"""
          if old_block not in milka:
              raise RuntimeError('Cronograma da Milka não encontrado')
          milka_path.write_text(milka.replace(old_block, new_block, 1), encoding='utf-8')
          PY

      - name: Formatar
        working-directory: novo-site
        run: npx --yes prettier@3.6.2 --write src/pages/MilkaMaria.jsx src/pages/Mural.jsx src/App.jsx src/pages/Central.jsx

      - name: Salvar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add novo-site/src
          git commit -m "feat: concluir página da Milka"
          git push
