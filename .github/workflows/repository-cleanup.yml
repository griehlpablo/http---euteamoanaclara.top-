name: Limpeza final do repositório

on:
  push:
    paths:
      - .github/workflows/repository-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Limpar código e documentação
        run: |
          python - <<'PY'
          import json
          import re
          import textwrap
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, content):
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content.rstrip() + '\n', encoding='utf-8')

          def replace(path, old, new):
              content = read(path)
              if old not in content:
                  raise RuntimeError(f'Trecho não encontrado em {path}: {old[:80]!r}')
              write(path, content.replace(old, new))

          def remove_line_comments(path):
              content = read(path)
              lines = [line for line in content.splitlines() if not re.match(r'^\s*//', line)]
              write(path, '\n'.join(lines))

          replace(
              'novo-site/src/components/helena/HelenaExportReport.jsx',
              'Exportar Helena para ChatGPT',
              'Exportar relatório da Helena',
          )

          for path in ['novo-site/src/pages/Dieta.jsx', 'novo-site/src/pages/PlanoHelena.jsx']:
              content = read(path).replace(
                  'Pergunta para o ChatGPT: Analise meu dia e me diga o que ajustar ainda hoje ou amanha.',
                  'Pergunta para análise: Avalie meu dia e diga o que ajustar ainda hoje ou amanhã.',
              )
              write(path, content)

          dieta_path = 'novo-site/src/pages/Dieta.jsx'
          dieta = read(dieta_path)
          dieta = dieta.replace(
              'Calendario diario com alimentacao, treino, agua, peso, calculos aproximados e relatorio pronto para mandar ao ChatGPT.',
              'Calendário diário com alimentação, treino, água, peso, cálculos aproximados e relatório organizado para compartilhar.',
          )
          dieta = dieta.replace('Texto pronto para mandar ao ChatGPT.', 'Texto organizado para copiar ou compartilhar.')
          dieta = dieta.replace('Exportar dia para o ChatGPT', 'Exportar relatório do dia')
          write(dieta_path, dieta)

          central_path = 'novo-site/src/pages/Central.jsx'
          write(central_path, read(central_path).replace('IA para dicas de encontros.', 'Conselhos e ideias para o casal.'))

          for path in [
            'novo-site/src/lib/healthPlanDiagnostics.js',
            'novo-site/src/pages/Galeria.jsx',
            'novo-site/src/pages/Genealogia.jsx',
            'novo-site/src/pages/Home.jsx',
            'novo-site/src/pages/Humor.jsx',
            'novo-site/src/pages/Links.jsx',
            'novo-site/src/pages/Mural.jsx',
            'novo-site/src/pages/Retrospectiva.jsx',
            'novo-site/src/pages/Satisfacao.jsx',
          ]:
              remove_line_comments(path)

          assistant_path = 'novo-site/src/pages/AssistenteCasal.jsx'
          assistant = read(assistant_path)
          assistant = assistant.replace(
              "    (async () => {\n    try {\n      await migrateLocalChats();\n    } catch (error) {\n      console.warn('Não foi possível migrar as conversas locais:', error);\n    }\n    const { data, error } = await supabase.from('chats').select('*').order('createdAt', { ascending: false });",
              "    (async () => {\n      try {\n        await migrateLocalChats();\n      } catch (error) {\n        console.warn('Não foi possível migrar as conversas locais:', error);\n      }\n      const { data, error } = await supabase.from('chats').select('*').order('createdAt', { ascending: false });",
          )
          assistant = assistant.replace(
              "      const hasNotificationTag = botResponse.includes('[AVISAR_PABLO]');\n    const notificationRequested",
              "      const hasNotificationTag = botResponse.includes('[AVISAR_PABLO]');\n      const notificationRequested",
          )
          for phrase in [
              "    if (hasNotificationTag) botResponse",
              "    if (hasNotificationTag || notificationRequested) {",
              "      const notificationResult = await sendPartnerNotification({",
              "        targetUser: 'pablo',",
              "        title: 'Recado da Ana pelo Cupido 💘',",
              "        message: `${prompt || 'Ana enviou um arquivo'} — ${botResponse}`",
              "        data: { source: 'assistente-casal', chatId: activeChatId },",
              "      });",
              "      if (notificationResult.whatsApp?.ok) {",
              "        botResponse += '\\n\\nRecado enviado ao Pablo pelo WhatsApp. 💌';",
              "      } else if (notificationResult.push?.ok) {",
              "        botResponse += '\\n\\nEnviei uma notificação ao Pablo, mas o WhatsApp não confirmou o recebimento.';",
              "      } else {",
              "        botResponse += '\\n\\nNão consegui entregar o recado ao Pablo agora.';",
              "      }",
              "    }",
          ]:
              if phrase.startswith('    '):
                  assistant = assistant.replace(phrase, '  ' + phrase)
          write(assistant_path, assistant)

          worker_path = 'novo-site/public/OneSignalSDKWorker.js'
          worker = read(worker_path).replace(
              '// Requests to Open Food Facts, Supabase and any other external origin must go straight to the browser.',
              '// Requisições externas não devem ser armazenadas pelo service worker.',
          )
          write(worker_path, worker)

          for path in [
            'supabase/migrations/20260601_daily_health_logs.sql',
            'novo-site/supabase/migrations/20260601_daily_health_logs.sql',
          ]:
              content = read(path)
              content, count = re.subn(
                  r"-- Current project tables are configured without RLS for simple shared use\.[\s\S]*?--   WITH CHECK \(auth\.uid\(\) = user_id\);",
                  '-- O site usa acesso compartilhado sem autenticação.\nALTER TABLE IF EXISTS daily_health_logs DISABLE ROW LEVEL SECURITY;',
                  content,
                  count=1,
              )
              if count != 1:
                  raise RuntimeError(f'Bloco de RLS não encontrado em {path}.')
              write(path, content)

          schema_path = 'novo-site/supabase_schema.sql'
          schema = read(schema_path)
          schema = schema.replace('-- Supabase schema generated from Firestore usage in project', '-- Estrutura principal das tabelas do site.')
          schema = schema.replace('-- Disable Row Level Security (RLS) for initial testing', '-- O acesso compartilhado atual depende de RLS desativado.')
          schema = schema.replace('-- Optional: small indexes to support common ordering queries', '-- Índices usados nas ordenações mais frequentes.')
          schema = schema.replace('-- End of schema\n', '')
          schema = schema.replace('-- GENERAL SCHEMA REPAIR - SAFE TO RUN MULTIPLE TIMES', '-- Ajustes de compatibilidade do schema.')
          schema = schema.replace('-- Does not delete data. Does not touch humor/satisfacao tables.', '-- Não remove dados nem altera as tabelas de humor e satisfação.')
          write(schema_path, schema)

          repair_path = 'supabase/migrations/repair_supabase_schema_general.sql'
          repair = read(repair_path)
          repair = repair.replace('-- GENERAL SCHEMA REPAIR - SAFE TO RUN MULTIPLE TIMES', '-- Ajustes de compatibilidade do schema.')
          repair = repair.replace('-- Does not delete data. Does not touch humor/satisfacao tables.', '-- Não remove dados nem altera as tabelas de humor e satisfação.')
          repair = repair.replace('-- RLS disabled to keep compatibility with the current site behavior.', '-- O site usa acesso compartilhado sem autenticação.')
          write(repair_path, repair)

          readme = textwrap.dedent('''
          # Eu Te Amo Ana Clara

          Site pessoal do casal, com central de memórias, mural, planos, registros e o Cupido Virtual.

          ## Desenvolvimento

          ```bash
          npm ci
          npm run dev
          ```

          ## Publicação

          As alterações são feitas em `novo-site`. Para gerar a versão publicada na raiz:

          ```bash
          npm run build:root
          ```

          O cliente do Supabase usa a chave pública do projeto. A URL e a chave também podem ser fornecidas pelas variáveis `VITE_SUPABASE_URL` e `VITE_SUPABASE_ANON_KEY`.
          ''').strip()
          write('novo-site/README.md', readme)

          package_path = Path('novo-site/package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          package['name'] = 'eu-te-amo-ana-clara'
          package['version'] = '1.0.0'
          package['dependencies'].pop('@google/generative-ai', None)
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          for path in [
            'SUPABASE_TABLES_CHECKLIST.md',
            'novo-site/request.json',
            'novo-site/testar_cupido.sh',
            'novo-site/src/App.css',
            'novo-site/src/assets/react.svg',
            'novo-site/src/assets/vite.svg',
            'novo-site/src/assets/hero.png',
            'novo-site/src/components/PinGate.jsx',
            'novo-site/src/config/access.js',
            'novo-site/supabase/.temp/cli-latest',
            'novo-site/supabase/.temp/gotrue-version',
            'novo-site/supabase/.temp/postgres-version',
            'novo-site/supabase/.temp/rest-version',
            'novo-site/supabase/.temp/storage-migration',
            'novo-site/supabase/.temp/storage-version',
            'supabase/.temp/cli-latest',
          ]:
              Path(path).unlink(missing_ok=True)
          PY

      - name: Atualizar dependências
        working-directory: novo-site
        run: npm install --package-lock-only && npm ci

      - name: Compilar e publicar na raiz
        working-directory: novo-site
        run: npm run build:root

      - name: Verificar o conteúdo
        run: |
          python - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          forbidden = re.compile(
              r'chatgpt|openai|github\s+copilot|\bcopilot\b|anthropic|\bclaude\b|'
              r'ai[- ]generated|generated\s+by|criad[oa]\s+por\s+(?:uma\s+)?ia',
              re.I,
          )
          meta_comment = re.compile(
              r'^\s*//.*\b(?:mágica|novo|nova|componente|corrigido|corrigida|agora)\b',
              re.I,
          )
          matches = []
          for path in subprocess.check_output(['git', 'ls-files']).decode().splitlines():
              if path.startswith('.github/workflows/') or path in {'_repository_audit.txt', '_code_diagnostic.txt'}:
                  continue
              file_path = Path(path)
              if not file_path.exists() or file_path.suffix.lower() not in {
                  '.js', '.jsx', '.ts', '.tsx', '.mjs', '.html', '.md', '.sql', '.sh', '.json',
              }:
                  continue
              try:
                  text = file_path.read_text(encoding='utf-8')
              except (UnicodeDecodeError, OSError):
                  continue
              for number, line in enumerate(text.splitlines(), 1):
                  if forbidden.search(line) or meta_comment.search(line):
                      matches.append(f'{path}:{number}:{line.strip()}')
          if matches:
              raise SystemExit('Resíduos encontrados:\n' + '\n'.join(matches[:100]))
          PY

      - name: Salvar limpeza
        run: |
          rm -f _repository_audit.txt _code_diagnostic.txt
          rm -f .github/workflows/repository-audit.yml
          rm -f .github/workflows/code-maintenance.yml
          rm -f .github/workflows/code-diagnostic.yml
          rm -f .github/workflows/repository-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: limpar código e arquivos antigos"
          git push
